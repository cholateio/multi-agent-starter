# PROJECT.toml — 專案 manifest(機器可讀,`proj` 指令據此做跨專案彙總)。
# user-owned:kit 永不覆蓋。狀態/指令/付費服務改變時同步本檔,並更新 updated。

name = "multi-agent-starter"
status = "active"
status_note = "kit 本體 v4.6:review 經濟學(re-review 範圍收斂、gate 測試檔不計數、註解紀律)完成;下一步:push 後 --update 鋪開機隊(含欠 update 的 anatomy-rag、cholate-blog)"
updated = 2026-07-12

[commands]                 # 只收「用它」的指令;測試指令見 tests/
init-new = "./init.sh <target-dir>"
update-all = "for d in /home/cholate/*/; do [ -f \"$d/.claude/kit-version\" ] && ./init.sh \"$d\" --update; done"

# 無付費外部服務(codex/claude 訂閱屬機器層,不算專案綁定)
